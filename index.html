<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>バースト99</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 10px;
    }

    #status {
      font-size: 1.5em;
      height: 40px;
      margin-bottom: 10px;
    }

    #score {
      font-size: 3em;
      font-weight: bold;
      margin: 20px 0;
      transition: color 0.2s ease;
    }

    .burst {
      color: red !important;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 420px;
      margin: 0 auto;
    }

    button {
      font-size: 1.3em;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.96);
    }

    .wide {
      grid-column: span 3;
      background: #eee;
    }
  </style>
</head>

<body>

<h1><a href="https://himatami.jp/games/40">99《バーストゲーム》</a></h1>

<div id="status"></div>
<div id="score">0</div>

<div class="grid">
  <button onclick="add(1)">1</button>
  <button onclick="add(2)">2</button>
  <button onclick="add(3)">3</button>

  <button onclick="add(5)">5</button>
  <button onclick="add(6)">6</button>
  <button onclick="add(7)">7</button>

  <button onclick="add(8)">8</button>
  <button onclick="add(10)">10</button>
  <button onclick="add(11)">11</button>

  <button onclick="set99()">99</button>
  <button onclick="add(-10)">-10</button>

  <button class="wide" onclick="reset()">リセット</button>
</div>

<script>
  let total = 0;
  let burst = false;

  function getColor(value) {
    // 0 → 緑（120deg）、99 → 赤（0deg）
    let hue = 120 - (value / 99) * 120;

    if (hue < 0) hue = 0;
    if (hue > 120) hue = 120;

    return `hsl(${hue}, 80%, 45%)`;
  }

  function update() {
    const score = document.getElementById("score");
    const status = document.getElementById("status");

    score.textContent = total;

    if (burst) {
      score.style.color = "red";
      status.textContent = "BURST!";
      status.classList.add("burst");
    } else {
      score.style.color = getColor(total);
      status.textContent = "";
      status.classList.remove("burst");
    }
  }

  function add(value) {
    if (burst) return;

    total += value;

    if (total > 99) {
      burst = true;
    }

    update();
  }

  function set99() {
    if (burst) return;
    total = 99;
    update();
  }

  function reset() {
    total = 0;
    burst = false;
    update();
  }

  update();
</script>

</body>
</html>
